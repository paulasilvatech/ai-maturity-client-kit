name: Build per-language ZIPs

on:
  push:
    branches: [main]
    paths:
      - '.github/agents/**'
      - '.github/copilot-instructions.md'
      - '.github/prompts/**'
      - '.github/skills/**'
      - 'kit-en/**'
      - 'kit-es/**'
      - 'README.md'
      - 'GUIA-PASSO-A-PASSO.md'
      - 'framework.json'
      - 'scripts/build_language_kits.py'
      - '.github/workflows/release-zips.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build 3 ZIPs (PT, EN, ES)
        run: python3 scripts/build_language_kits.py --out dist --clean

      - name: Publish latest release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: kits-${{ github.run_number }}
        run: |
          gh release create "$RELEASE_TAG" dist/*.zip \
            --repo "$GITHUB_REPOSITORY" \
            --title "Latest kits (PT · EN · ES)" \
            --notes "Auto-built kits per language.\n\n- ai-maturity-kit-pt.zip — kit completo em Português (Brasil)\n- ai-maturity-kit-en.zip — kit with English client docs\n- ai-maturity-kit-es.zip — kit con docs cliente en Español" \
            --latest
