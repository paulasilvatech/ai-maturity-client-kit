name: Copilot Setup Steps

# Preinstalls the kit's Python dependencies (and WeasyPrint's native Pango
# libraries) in the GitHub Copilot coding agent environment, so cloud-agent
# runs of the PDF pipeline work on the first attempt.
#
# Per official docs this file must live at .github/workflows/copilot-setup-steps.yml
# and contain a single job named exactly 'copilot-setup-steps'. It only takes
# effect from the default branch. The push/pull_request triggers exist solely
# to validate the workflow when it changes; Copilot runs the job on its own.

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

permissions:
  contents: read

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: pip
          # No requirements.txt in this repo; key the pip cache on this
          # workflow file, which declares the dependencies below.
          cache-dependency-path: .github/workflows/copilot-setup-steps.yml

      - name: Install WeasyPrint native dependencies (Pango)
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0

      - name: Install Python dependencies
        run: pip install jinja2 weasyprint openpyxl

      - name: Sanity-check imports
        run: python -c "import jinja2, weasyprint, openpyxl"
